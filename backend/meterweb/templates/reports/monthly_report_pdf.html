<!DOCTYPE html>
<html lang="{{ lang|default('de') }}">
<head>
  <meta charset="UTF-8">
  <title>{{ t('monthly_report_heading') }}</title>
  <style>
    body { font-family: Arial, sans-serif; color: #1f2937; }
    h1 { font-size: 24px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { background-color: #f3f4f6; }
    th, td { border: 1px solid #d1d5db; padding: 8px; text-align: left; }
    tbody tr:nth-child(even) { background-color: #f9fafb; }
  </style>
</head>
<body>
  <h1>{{ t('monthly_report_heading') }}</h1>
  <table>
    <thead>
      <tr>
        <th>{{ t('month') }}</th>
        <th>{{ t('readings') }}</th>
        <th>{{ t('consumption') }}</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ fmt_month(row.month) }}</td>
        <td>{{ fmt_number(row.readings) }}</td>
        <td>{{ fmt_number(row.consumption) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
